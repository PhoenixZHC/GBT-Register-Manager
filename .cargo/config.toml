# 缓解国内访问 crates.io 慢/超时：使用 rsproxy 稀疏索引。
# 若你网络直连 crates.io 正常，可删除本文件或注释 [source.crates-io] 整段。
[source.crates-io]
replace-with = "rsproxy-sparse"

[source.rsproxy-sparse]
registry = "sparse+https://rsproxy.cn/index/"

[net]
retry = 5

# 静态链接 MSVC C++ 运行时（msvcp140.dll / vcruntime140.dll）。
# 效果：安装包不再依赖客户电脑上的 Visual C++ Redistributable，
#       彻底消除"缺少 DLL"导致白屏或闪退的问题。
# 代价：可执行文件体积增大约 200-400 KB，可忽略不计。
[target.x86_64-pc-windows-msvc]
rustflags = ["-C", "target-feature=+crt-static"]
