<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GBT Register Manager</title>
    <style>
      #gbt-splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #18181c;
        color: #e0e0e0;
        font-family: system-ui, "Microsoft YaHei", sans-serif;
        font-size: 14px;
        z-index: 9999;
        gap: 16px;
        transition: opacity 0.3s ease;
      }
      #gbt-splash.hidden {
        opacity: 0;
        pointer-events: none;
      }
      #gbt-splash-spinner {
        width: 36px;
        height: 36px;
        border: 3px solid #444;
        border-top-color: #18a058;
        border-radius: 50%;
        animation: gbt-spin 0.8s linear infinite;
      }
      #gbt-splash-error {
        display: none;
        color: #e88080;
        text-align: center;
        max-width: 360px;
        line-height: 1.6;
      }
      #gbt-splash-hint {
        color: #888;
        font-size: 12px;
      }
      @keyframes gbt-spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="gbt-splash">
      <div id="gbt-splash-spinner"></div>
      <div id="gbt-splash-msg">正在启动…</div>
      <div id="gbt-splash-error"></div>
      <div id="gbt-splash-hint"></div>
    </div>
    <div id="app"></div>
    <script type="module" src="/src/splash.ts"></script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
